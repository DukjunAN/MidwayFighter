<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>미드웨이 전투 (Midway Fighter)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; background-color: #111; touch-action: none; user-select: none; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #game-container {
            position: relative;
            height: 100vh;
            width: calc(100vh * 9 / 16);
            background: #000;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        #central-hud {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; height: 320px; border: 2px solid rgba(57, 255, 20, 0.2); border-radius: 50%;
            pointer-events: none; z-index: 100; display: none;
        }
        #reticle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 30px; height: 30px; border: 2px solid #39FF14; border-radius: 50%; 
            pointer-events: none; z-index: 110; display: none;
        }
        .hud-value {
            position: absolute; color: #39FF14; font-family: 'Courier New', monospace; font-weight: bold;
            text-shadow: 1px 1px 2px #000; font-size: 24px;
        }
        #hud-alt-box { bottom: 20px; left: -50px; }
        #hud-speed-box { bottom: 20px; right: -50px; }

        #title-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.9) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 1.0s; padding: 20px; box-sizing: border-box; text-align: center;
        }
        #title-screen h1 { color: #fff; font-size: clamp(30px, 10vw, 60px); margin-bottom: 5px; text-shadow: 0 0 20px rgba(255,255,255,0.5); font-style: italic; }
        #subtitle { color: #00d2ff; font-size: 18px; margin-bottom: 30px; letter-spacing: 2px; }
        
        .setup-box { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 30px; }
        .option-row { color: #ccc; font-size: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        
        #start-button { padding: 15px 50px; font-size: 20px; background: none; color: #fff; border: 2px solid #fff; cursor: pointer; transition: 0.3s; }
        #start-button:hover { background: #fff; color: #000; }

        #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 500; }
        #top-left-ui { position: absolute; top: 20px; left: 20px; color: #0f0; font-family: monospace; font-size: 16px; line-height: 1.5; text-shadow: 1px 1px 2px #000; }
        
        #bottom-left-ui { position: absolute; bottom: 40px; left: 30px; z-index: 600; display: flex; align-items: flex-end; gap: 30px; pointer-events: auto; }
        #bottom-right-ui { position: absolute; bottom: 40px; right: 30px; z-index: 600; display: flex; align-items: flex-end; pointer-events: auto; }
        
        #ui-joystick-container { width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; position: relative; touch-action: none; }
        #ui-joystick-handle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: rgba(255,255,255,0.5); border: 2px solid #fff; border-radius: 50%; pointer-events: none; }
        
        #ui-fire-btn { width: 110px; height: 110px; background: rgba(255,0,0,0.5); border: 4px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; font-weight: bold; font-size: 22px; touch-action: none; }
        #ui-fire-btn:active, #ui-fire-btn.pressing { background: rgba(255,0,0,0.9); transform: scale(0.85); }

        #hit-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.3); pointer-events: none; display: none; z-index: 1000; }
        #hit-flash.active { display: block; }

        #alt-warning {
            position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
            width: 80%; padding: 20px; background: rgba(255, 0, 0, 0.8);
            color: #fff; text-align: center; border: 4px solid #fff;
            font-family: 'Malgun Gothic', sans-serif; font-weight: bold;
            z-index: 2000; display: none;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="alt-warning">
            <h2>ALITIUDE WARNING!</h2>
            <p>5000m 이하로 하강하세요!</p>
            <p>추락까지 <span id="alt-timer">10</span>초</p>
        </div>
        <div id="title-screen">
            <h1>미드웨이 전투</h1>
            <div id="subtitle">BATTLE OF MIDWAY</div>
            
            <div class="setup-box">
                <label class="option-row">
                    <input type="checkbox" id="invert-pitch"> Invert Axis (상하 반전)
                </label>
            </div>

            <button id="start-button">게임 시작</button>
        </div>

        <div id="game-ui">
            <div id="central-hud">
                <div id="hud-alt-box" class="hud-value">ALT <span id="alt-val-central">0</span>m</div>
                <div id="hud-speed-box" class="hud-value">SPD <span id="speed-val-central">0</span></div>
            </div>
            <div id="reticle"></div>

            <div id="top-left-ui">
                HP: <span id="val-hp">100</span> | SPEED: <span id="speed-val">0</span> km/h<br>
                ALT: <span id="alt-val">0</span>m | UNITS: <span id="val-units">0</span>
            </div>

            <div id="bottom-left-ui">
                <div id="ui-joystick-container">
                    <div id="ui-joystick-handle"></div>
                </div>
            </div>

            <div id="bottom-right-ui">
                <div id="ui-fire-btn">FIRE</div>
            </div>
        </div>

        <div id="hit-flash"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="./main.js"></script>
</body>
</html>
