<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flight Test: Player Aircraft</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; user-select: none; }
        
        /* 왼쪽 상단: 모델 선택 메뉴 및 기본 정보 */
        #top-left-ui {
            position: absolute; top: 10px; left: 10px; z-index: 100;
            display: flex; flex-direction: column; gap: 10px;
        }
        #stats-ui { color: #0f0; pointer-events: none; text-shadow: 1px 1px 2px #000; font-size: 14px; line-height: 1.4; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; pointer-events: auto; }
        button { background: rgba(0, 50, 0, 0.6); color: #0f0; border: 1px solid #0f0; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-size: 12px; }
        button:hover { background: rgba(0, 100, 0, 0.8); }

        /* 왼쪽 하단: 스로틀 및 고정형 조이스틱 */
        #bottom-left-ui {
            position: absolute; bottom: 30px; left: 30px; z-index: 200;
            display: flex; align-items: flex-end; gap: 30px; pointer-events: auto;
        }

        /* 고정식 조이스틱 */
        #ui-joystick-container { 
            width: 150px; height: 150px; 
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); 
            border-radius: 50%; position: relative; touch-action: none; 
        }
        #ui-joystick-handle { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 60px; height: 60px; background: rgba(255,255,255,0.4); 
            border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); pointer-events: none; 
        }

        /* 수직 스로틀 슬라이더 */
        #ui-throttle-container { 
            width: 40px; height: 250px; 
            background: rgba(0, 0, 0, 0.4); border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.2); 
            touch-action: none; pointer-events: auto; position: relative;
        }
        #ui-throttle-track { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); 
            width: 4px; height: 220px; background: rgba(255, 255, 255, 0.1); 
        }
        #ui-throttle-handle { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 50px; height: 24px; background: #eee; border-radius: 4px; 
            cursor: ns-resize; box-shadow: 0 0 15px rgba(0,0,0,0.5); 
        }

        /* 오른쪽 하단: 총알 발사 버튼 */
        #bottom-right-ui {
            position: absolute; bottom: 30px; right: 30px; z-index: 200;
            display: flex; align-items: flex-end; pointer-events: auto;
        }

        /* 총알 발사 버튼 */
        #ui-fire-btn { 
            width: 140px; height: 140px; 
            background: rgba(255, 255, 255, 0.1); border: 4px solid rgba(255, 255, 255, 0.4); 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; touch-action: none;
        }
        #ui-fire-btn:active, #ui-fire-btn.pressing { background: rgba(255, 0, 0, 0.4); transform: scale(0.95); }
        .bullet-icon { width: 110px; height: 110px; opacity: 0.9; }

        /* 중앙 하단 계기판 제거됨 */

        #hit-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.4); pointer-events: none; display: none; z-index: 1000; }
        #hit-flash.active { display: block; }
    </style>
</head>
<body>
    <!-- 왼쪽 상단 UI -->
    <div id="top-left-ui">
        <div id="stats-ui">
            <div>HP: <span id="val-hp">100</span> | SPEED: <span id="val-speed">0</span> km/h <span id="overheat-text" style="color: #ff0; display: none;">OVERHEAT!</span></div>
            <div>PITCH: <span id="val-pitch">0</span> | ROLL: <span id="val-roll">0</span></div>
            <div>POS: <span id="val-pos">0, 0, 0</span></div>
            <div>INPUT: X:<span id="val-in-x">0</span> Y:<span id="val-in-y">0</span></div>
        </div>
        <div class="btn-group">
            <button id="btn-f4f">F4F Wildcat</button>
            <button id="btn-tbf">TBF Avenger</button>
            <button id="btn-hit">Simulate Hit</button>
            <button id="btn-spawn-drone">Spawn Drone</button>
        </div>
    </div>

    <!-- 왼쪽 하단 UI -->
    <div id="bottom-left-ui">
        <div id="ui-joystick-container">
            <div id="ui-joystick-handle"></div>
        </div>
        <div id="ui-throttle-container">
            <div id="ui-throttle-track"></div>
            <div id="ui-throttle-handle"></div>
        </div>
    </div>

    <!-- 오른쪽 하단 UI -->
    <div id="bottom-right-ui">
        <div id="ui-fire-btn">
            <svg class="bullet-icon" viewBox="8 1 20 22">
                <g fill-opacity="0.5">
                    <path d="M10,2L8.5,5H11.5L10,2M8.5,6V18H11.5V6H8.5M8.5,19V21A1,1 0 0,0 9.5,22H10.5A1,1 0 0,0 11.5,21V19H8.5Z" fill="white"/>
                    <path d="M18,2L16.5,5H19.5L18,2M16.5,6V18H19.5V6H16.5M16.5,19V21A1,1 0 0,0 17.5,22H18.5A1,1 0 0,0 19.5,21V19H16.5Z" fill="white"/>
                    <path d="M26,2L24.5,5H27.5L26,2M24.5,6V18H27.5V6H24.5M24.5,19V21A1,1 0 0,0 25.5,22H26.5A1,1 0 0,0 27.5,21V19H24.5Z" fill="white"/>
                </g>
            </svg>
        </div>
    </div>
    
    <div id="hit-flash"></div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
    <script type="module" src="./test_flight_player.js"></script>
</body>
</html>
