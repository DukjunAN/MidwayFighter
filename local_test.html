<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>GLB 로컬 파일 테스트 뷰어 (v3 - 재질 보정)</title>
<style>
    body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
    #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 10;
        background: rgba(0,0,0,0.85);
        padding: 20px;
        border-radius: 8px;
        border: 1px solid #00d2ff;
        color: white;
        width: 280px;
    }
    strong { color: #00d2ff; font-size: 16px; display: block; margin-bottom: 10px; }
    input[type="file"] { 
        margin-top: 10px; 
        width: 100%;
        background: #222;
        color: #fff;
        padding: 5px;
        border-radius: 4px;
        border: 1px solid #444;
    }
    .option-group { margin-top: 15px; background: #222; padding: 10px; border-radius: 4px; }
    .option-group label { font-size: 12px; display: block; margin-bottom: 5px; }
    .info { font-size: 12px; color: #aaa; margin-top: 15px; line-height: 1.6; border-top: 1px solid #333; padding-top: 10px; }
    #log { margin-top: 10px; font-family: monospace; font-size: 11px; color: #8aff8a; min-height: 3em; }
</style>
</head>
<body>

<div id="ui">
    <strong>기믹 확인용 로컬 뷰어</strong>
    파일 선택 (.glb)
    <input type="file" id="fileInput" accept=".glb,.gltf">
    
    <div class="option-group">
        <label><input type="checkbox" id="fixMaterial" checked> <b>강제 재질 보정 (추천)</b></label>
        <span style="font-size: 10px; color: #888;">투명도 겹침/비침 문제를 코드로 해결합니다.</span>
    </div>

    <div id="log">준비됨</div>
    
    <div class="info">
        - <b>F4F_Propellor</b>: 회전 테스트<br>
        - <b>gun001~006</b>: 총구 가이드<br>
        - 마우스 좌: 회전 / 우: 이동 / 휠: 확대
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';

let scene, camera, renderer, controls, modelGroup;
let propeller = null;
let guns = [];

init();
animate();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(5, 5, 5);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 조명 (주인공 기체를 위해 밝게 설정)
    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(5, 10, 7);
    scene.add(sun);

    scene.add(new THREE.GridHelper(20, 20, 0x444444, 0x222222));
    modelGroup = new THREE.Group();
    scene.add(modelGroup);

    document.getElementById('fileInput').addEventListener('change', loadModel);
    document.getElementById('fixMaterial').addEventListener('change', () => {
        if (modelGroup.children.length > 0) applyFix(modelGroup.children[0]);
    });
}

function applyFix(model) {
    const isFixEnabled = document.getElementById('fixMaterial').checked;
    
    model.traverse(child => {
        if (child.isMesh && child.material) {
            const mats = Array.isArray(child.material) ? child.material : [child.material];
            mats.forEach(mat => {
                if (isFixEnabled) {
                    // 유리가 아닌 경우 강제로 불투명 모드로 전환
                    const isGlass = /glass|canopy|window|pane/i.test(child.name) || /glass|canopy/i.test(mat.name);
                    
                    if (!isGlass) {
                        mat.transparent = false;
                        mat.opacity = 1.0;
                        mat.alphaTest = 0.5;
                        mat.depthWrite = true;
                        mat.side = THREE.DoubleSide; // 안쪽 면도 보이게
                    } else {
                        mat.transparent = true;
                        mat.opacity = 0.3;
                        mat.depthWrite = false;
                    }
                } else {
                    // 원래 모델 설정 유지 (보통 GLB 기본값은 AlphaBlend일 때가 많음)
                    // 새로 고침 없이 끄면 완벽하게 돌아가진 않을 수 있음
                }
                mat.needsUpdate = true;
            });
        }
    });
}

function loadModel(event) {
    const file = event.target.files[0];
    if (!file) return;

    const log = document.getElementById('log');
    log.innerText = "로딩 중...";
    log.style.color = "#ffff00";

    const url = URL.createObjectURL(file);
    const loader = new GLTFLoader();

    loader.load(url, (gltf) => {
        while(modelGroup.children.length > 0) modelGroup.remove(modelGroup.children[0]);
        
        propeller = null;
        guns = [];

        const model = gltf.scene;
        modelGroup.add(model);

        // 중앙 정렬
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        model.position.sub(center);
        
        // 재질 보정 적용
        applyFix(model);

        camera.position.set(size.z * 1.5, size.y * 1.5, size.z * 1.5);
        controls.target.set(0, 0, 0);
        controls.update();

        model.traverse(child => {
            if (child.name === "F4F_Propellor") propeller = child;
            if (child.name.startsWith("gun00")) guns.push(child);
        });

        log.innerText = `성공: 프로펠러(${propeller ? 'O' : 'X'}), 총구(${guns.length}개)`;
        log.style.color = "#8aff8a";
    }, undefined, (err) => {
        log.innerText = "로딩 실패: " + err.message;
        log.style.color = "#ff7777";
    });
}

function animate() {
    requestAnimationFrame(animate);
    if (propeller) propeller.rotation.y += 0.3;
    guns.forEach(gun => {
        if (!gun.userData.flash) {
            const geo = new THREE.SphereGeometry(0.03);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
            const flash = new THREE.Mesh(geo, mat);
            gun.add(flash);
            flash.position.set(0, 0, 0.1); 
            gun.userData.flash = flash;
        }
    });
    controls.update();
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
