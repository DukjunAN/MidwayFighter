<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MidwayFighter Model Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #333; font-family: sans-serif; }
        #container { width: 100vw; height: 100vh; }
        #ui {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.7); color: white; padding: 15px;
            border-radius: 8px; max-height: 90vh; overflow-y: auto;
            width: 250px;
        }
        h2 { font-size: 16px; margin-top: 0; }
        .model-item { margin-bottom: 5px; cursor: pointer; padding: 5px; border-bottom: 1px solid #444; }
        .model-item:hover { background: #555; }
        .active { color: #ffff00; font-weight: bold; }
        .info { font-size: 12px; color: #aaa; margin-top: 10px; }
        button { width: 100%; margin-top: 10px; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>모델 리스트</h2>
        <div id="model-list"></div>
        <hr style="border:0; border-top:1px solid #444; margin:10px 0;">
        <div id="status-panel" style="background: rgba(0,255,0,0.1); padding: 10px; border: 1px solid #00ff00; border-radius: 4px; display: none;">
            <div style="color: #00ff00; font-weight: bold; margin-bottom: 5px;">[선택된 모델 정보]</div>
            <div id="info-name">이름: -</div>
            <div id="info-scale">스케일: -</div>
            <div id="info-pos">위치(X,Y,Z): - (m)</div>
            <div id="info-rot">회전(Y): -</div>
        </div>
        <button id="btn-delete-selected" style="background:#cc3333; color:white;">선택 모델 삭제</button>
        <button onclick="clearScene()">전체 초기화</button>
        <div class="info">
            <strong>[조작 가이드]</strong><br>
            * 클릭: 모델 선택<br>
            * <strong>Ctrl + 휠: 크기 조절 (Scale)</strong><br>
            * W: 이동 / E: 회전 / R: 스케일<br>
            * Delete: 선택 모델 삭제<br>
            * 마우스 왼쪽: 화면 회전<br>
            * 마우스 오른쪽: 화면 이동
        </div>
    </div>
    <div id="container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "fflate": "https://unpkg.com/fflate@0.8.0/lib/browser.module.js"
            }
        }
    </script>
    <script type="module" src="./viewer.js"></script>
</body>
</html>
